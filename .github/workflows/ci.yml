name: GhostPin CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build (compile only)
        run: ./gradlew :app:compileNonplayDebugKotlin --no-daemon

      - name: Unit Tests — core
        run: ./gradlew :core:test --no-daemon

      - name: Unit Tests — engine
        run: ./gradlew :engine:test --no-daemon

      - name: Unit Tests — app
        run: ./gradlew :app:testNonplayDebugUnitTest --no-daemon
        continue-on-error: true  # app tests may need Android stubs

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            core/build/reports/tests/
            engine/build/reports/tests/
            app/build/reports/tests/
          retention-days: 14

  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod a+x ktlint
          ./ktlint --reporter=plain "core/src/**/*.kt" "engine/src/**/*.kt" "app/src/**/*.kt" || true
