name: GhostPin Android Instrumentation

on:
  workflow_dispatch:
    inputs:
      api-level:
        description: Android API level for the emulator
        required: true
        default: "34"
      gradle-task:
        description: Gradle task to execute
        required: true
        default: ":app:connectedNonplayDebugAndroidTest"

jobs:
  connected-android-test:
    name: Connected Android Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run connected instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          arch: x86_64
          profile: pixel_6
          avd-name: ghostpin-ci-api-${{ inputs.api-level }}
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew --no-daemon ${{ inputs.gradle-task }}

      - name: Upload android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 14
